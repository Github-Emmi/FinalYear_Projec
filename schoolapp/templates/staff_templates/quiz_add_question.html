{% extends 'staff_templates/base.html' %}
{% load static %}
{% block title %}Add Question – {{ quiz.title }}{% endblock %}

{% block main_content %}
<div class="card card-primary">
  <div class="card-header">
    <h3 class="card-title">Add Question to {{ quiz.title }}</h3>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="card-body">

      <!-- Question Type -->
      <div class="form-group">
        <label>Question Type</label>
        <select name="question_type" id="question_type" class="form-control" required>
          <option value="MCQ">Multiple Choice</option>
          <option value="OPEN">Theory</option>
        </select>
      </div>

      <!-- Question Text -->
      <div class="form-group">
        <label>Question Text</label>
        <textarea name="question_text" class="form-control" rows="3" required></textarea>
      </div>

      <!-- MCQ Fields -->
      <div id="mcq_fields">
        <div class="form-group"><label>Option A</label><input type="text" name="option_a" class="form-control"></div>
        <div class="form-group"><label>Option B</label><input type="text" name="option_b" class="form-control"></div>
        <div class="form-group"><label>Option C</label><input type="text" name="option_c" class="form-control"></div>
        <div class="form-group"><label>Option D</label><input type="text" name="option_d" class="form-control"></div>
        <div class="form-group">
          <label>Correct Answer</label>
          <select name="correct_answer" class="form-control">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
        </div>
      </div>

      <!-- Open-Ended Fields -->
      <div id="open_fields" style="display:none;">
        <div class="form-group">
          <label>Correct Answer (Text)</label>
          <textarea name="correct_text_answer" class="form-control" rows="3"></textarea>
        </div>
      </div>

    </div>

    <div class="card-footer">
      <button type="submit" class="btn btn-primary">Add Question</button>
    </div>
  </form>
</div>
{% endblock %}

{% block custom_js %} 
<script>
document.getElementById("question_type").addEventListener("change", function(){
  let mcqFields = document.getElementById("mcq_fields");
  let openFields = document.getElementById("open_fields");
  if(this.value === "MCQ"){
    mcqFields.style.display = "block";
    openFields.style.display = "none";
  } else {
    mcqFields.style.display = "none";
    openFields.style.display = "block";
  }
});
</script>
{% endblock custom_js %}
