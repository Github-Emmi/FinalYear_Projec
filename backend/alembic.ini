# Alembic Configuration

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s_%%(ts)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to os.environ['TZ'] setting the TZ variable
# Leave the line in place such that the migration files
# are timestamped with the correct timezone
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by Alembic
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to ignore whitespace differences in migration files
# when assuming the next sequence value after reading history from
# the database. This is helpful in some cases, such as if you
# have migration files checked into the repository with inconsistent
# whitespace due to the merge conflicts beore resolving, which results
# in the its count being out of sync. By default, this is set to false, so
# some length mismatch will not be considered as an indication that
# the next revision number should be incremented.
# ignore_identity_mismatch = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
