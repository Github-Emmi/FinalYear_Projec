# Alembic configuration file for database migrations
# Created for School Management System - Phase 1

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# =============================================
# SQLAlchemy Database URL (from environment)
# =============================================
sqlalchemy.url = driver://user:password@localhost/dbname

# Path to migration scripts
script_location = migrations

# Logging configuration
sqlalchemy.echo = false
sqlalchemy.echo_pool = false

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# Leave as `None` to not touch times at all
timezone =

# max length of the branch name which is prepended to the migration file
# and autoincrement counter independent branch names
# Leave as `None` for unlimited length
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# see :meth:`MigrationContext.is_offline()` for specifics
# affects the default value of the --sql flag to upgrade/downgrade
always_on = false

# compare type instead of type name.
# useful for migrations made by different systems,
# else bool would not == BOOLEAN in terms of cmp_type.
compare_type = false

# compare server default in migrations.
compare_server_default = false
